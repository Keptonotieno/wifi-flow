<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Rounded Rect App Icon Background -->
  <rect width="512" height="512" rx="112" fill="#0f172a" />
  
  <!-- Soft atmospheric background highlight -->
  <circle cx="256" cy="270" r="160" fill="url(#gradient)" opacity="0.15" filter="url(#glow)" />
  
  <!-- Wifi Signal Waves -->
  <g filter="url(#glow)">
    <!-- Outer Wave -->
    <path d="M 120 200 A 180 180 0 0 1 392 200" fill="none" stroke="url(#gradient)" stroke-width="24" stroke-linecap="round" />
    
    <!-- Middle Wave -->
    <path d="M 168 250 A 120 120 0 0 1 344 250" fill="none" stroke="url(#gradient)" stroke-width="24" stroke-linecap="round" />
    
    <!-- Inner Wave -->
    <path d="M 216 300 A 60 60 0 0 1 296 300" fill="none" stroke="url(#gradient)" stroke-width="24" stroke-linecap="round" />
    
    <!-- Central Node / Router Pulse -->
    <circle cx="256" cy="350" r="28" fill="url(#gradient)" />
  </g>
</svg>
